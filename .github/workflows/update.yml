name: Update leaderboard data

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub's minimum)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data

      - name: Checkout fetch.py from main
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- fetch.py

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch leaderboard
        run: python fetch.py

      - name: Commit and push to data branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Don't accidentally commit fetch.py (it's pulled from main just for the run)
          git checkout -- fetch.py 2>/dev/null || true
          git restore --staged fetch.py 2>/dev/null || true
          rm -f fetch.py
          git add data.json
          git diff --cached --quiet || git commit -m "data: ci backup update"
          git push origin HEAD:data
