name: Update leaderboard data

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub's minimum)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data

      - name: Checkout fetch.py from main
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- fetch.py

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch leaderboard
        run: python fetch.py

      - name: Commit and push to data branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # fetch.py was checked out from main for this run; don't commit it
          git restore --staged fetch.py 2>/dev/null || true
          rm -f fetch.py

          # If nothing changed, exit cleanly
          git add data.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "data: ci backup update"

          # Retry with rebase to handle the local-tracker race condition
          for i in 1 2 3; do
            git fetch origin data
            git rebase origin/data || { git rebase --abort; echo "rebase conflict — skipping cycle"; exit 0; }
            if git push origin HEAD:data; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push failed attempt $i — retrying"
            sleep 2
          done
          echo "could not push after 3 attempts — local tracker is likely active, skipping"
          exit 0
